# ============================================================
# Project Analyzer 配置
# ============================================================
analyzer:
  # 要分析的项目路径（必填）
  project-path: .

  # 报告输出目录
  output-dir: ./analysis-reports

  # 要执行的分析模块（逗号分隔，留空表示全部）
  # 可选值: architecture, business, flow, api, structure, ops, pitfall, quickstart, ai-memory
  modules: ""

  # 覆盖自动检测的语言（留空表示自动检测）
  lang: ""

  # 反模式检测阈值
  thresholds:
    max-method-lines: 80
    max-nesting-depth: 4
    max-class-methods: 20
    max-class-lines: 500
    max-file-lines: 1000
