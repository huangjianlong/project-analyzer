# ============================================================
# Project Analyzer 配置
# ============================================================
analyzer:
  # 要分析的项目路径（必填）
  project-path: E:\project\bocon-app-upgrade

  # 报告输出目录
  output-dir: E:\project\bocon-app-upgrade\analysis-reports

  # 要执行的分析模块（逗号分隔，留空表示全部）
  # 可选值: architecture, business, flow, api, structure, ops, pitfall, quickstart, ai-memory
  modules: ""

  # 覆盖自动检测的语言（留空表示自动检测）
  lang: ""

  # 反模式检测阈值
  thresholds:
    max-method-lines: 80
    max-nesting-depth: 4
    max-class-methods: 20
    max-class-lines: 500
    max-file-lines: 1000

  # AI 大模型配置（LM Studio / OpenAI 兼容接口）
  ai:
    enabled: true
    base-url: http://192.168.0.106:1234/v1
    model: qwen/qwen3.5-9b
    # api-key 留空即可（LM Studio 本地不需要）
    api-key: ""
    # 请求超时（秒）
    timeout: 120
    # 最大 token 数
    max-tokens: 2000
    # 温度（0-1，越低越确定）
    temperature: 0.3
